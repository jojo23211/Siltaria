[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/site-data"
  to = "/.netlify/functions/site-data"
  status = 200

[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/logout"
  to = "/.netlify/functions/admin-logout"
  status = 200

[[redirects]]
  from = "/api/admin/check"
  to = "/.netlify/functions/admin-check"
  status = 200

[[redirects]]
  from = "/api/admin/site-data"
  to = "/.netlify/functions/admin-site-data"
  status = 200

[[redirects]]
  from = "/api/admin/change-password"
  to = "/.netlify/functions/admin-change-password"
  status = 200
